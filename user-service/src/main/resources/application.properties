# Quarkus configuration for Oppex-a Authentication Portal

# --- Application ---
quarkus.application.name=user-service

# --- HTTP ---
quarkus.http.port=8080

# --- CORS ---
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3001
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Type
quarkus.http.cors.access-control-max-age=24H

# --- Datasource ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/oppex_auth
quarkus.datasource.username=oppex
quarkus.datasource.password=oppex_secret
quarkus.datasource.jdbc.max-size=16

# --- Hibernate ORM ---
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- Mailer ---
quarkus.mailer.mock=false
quarkus.mailer.host=${SMTP_HOST:smtp.gmail.com}
quarkus.mailer.port=${SMTP_PORT:587}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${SMTP_USER:}
quarkus.mailer.password=${SMTP_PASS:}
quarkus.mailer.from=${SMTP_FROM:noreply@oppex.dev}

# --- App Config ---
app.verification.base.url=http://localhost:3001/verify
app.reset.password.base.url=http://localhost:5173/reset-password
