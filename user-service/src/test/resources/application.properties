# Test-specific configuration
# Uses the same database but drops and recreates schema for clean tests
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/oppex_auth
quarkus.datasource.username=oppex
quarkus.datasource.password=oppex_secret

# Recreate tables for each test run
quarkus.hibernate-orm.database.generation=drop-and-create

# Mock mailer in tests (no actual SMTP needed)
quarkus.mailer.mock=true

# Reduce logging noise in tests
quarkus.log.level=WARN
quarkus.log.category."com.example".level=INFO
