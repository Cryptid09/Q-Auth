# Production Docker Compose — Full Stack Deployment
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: oppex-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oppex_auth}
      POSTGRES_USER: ${POSTGRES_USER:-oppex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oppex} -d ${POSTGRES_DB:-oppex_auth}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  user-service:
    build: ./user-service
    container_name: oppex-user-service
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-oppex_auth}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-oppex}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      QUARKUS_MAILER_HOST: ${SMTP_HOST:-mailpit}
      QUARKUS_MAILER_PORT: ${SMTP_PORT:-1025}
      QUARKUS_MAILER_START_TLS: ${SMTP_TLS:-DISABLED}
      QUARKUS_MAILER_USERNAME: ${SMTP_USERNAME:-}
      QUARKUS_MAILER_PASSWORD: ${SMTP_PASSWORD:-}
      QUARKUS_MAILER_FROM: ${MAIL_FROM:-noreply@oppex.dev}
      QUARKUS_MAILER_MOCK: "false"
      APP_VERIFICATION_BASE_URL: ${VERIFICATION_BASE_URL:-http://localhost/verify}
      QUARKUS_HTTP_CORS_ORIGINS: http://gateway:3001
    networks:
      - backend

  gateway:
    build: ./gateway
    container_name: oppex-gateway
    restart: always
    depends_on:
      - user-service
    environment:
      QUARKUS_BASE_URL: http://user-service:8080
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      NODE_ENV: production
      GATEWAY_PORT: 3001
    networks:
      - backend
      - frontend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: oppex-frontend
    restart: always
    depends_on:
      - gateway
    ports:
      - "80:80"
    networks:
      - frontend

  # Optional: Mailpit for staging/testing (remove in real production)
  mailpit:
    image: axllent/mailpit:latest
    container_name: oppex-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - backend
    profiles:
      - dev

volumes:
  pgdata:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
